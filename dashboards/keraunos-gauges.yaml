# Ready-made Lovelace cards for the Keraunos Orages integration.
#
# Each sensor's STATE is the human-readable French text (e.g. "Risque d'orages
# forts"). The gravity level 0..5, official colour and probability range are
# ATTRIBUTES: level / level_max / color / level_label / probability_range.
#
# Because the state is text, a built-in gauge (which reads the numeric *state*)
# needs the level surfaced as a number first — see Option A. Option C avoids that
# with a custom card that can read the attribute directly.
#
# IMPORTANT: entity_ids below assume the commune device is named "Altorf"
# (entities like sensor.altorf_risque_d_orages). Replace the `sensor.altorf_…`
# ids with your own — check Settings → Devices & Services → Keraunos Orages →
# the entity ids of your commune.

# ─────────────────────────────────────────────────────────────────────────────
# Option A — Built-in gauge cards (no extra cards to install)
#
# Step 1: add template sensors that expose the level as a numeric state.
# Put this in configuration.yaml (then restart):
#
# template:
#   - sensor:
#       - name: "Altorf risque orages niveau"
#         unique_id: altorf_risque_orages_niveau
#         state: "{{ state_attr('sensor.altorf_risque_d_orages', 'level') }}"
#         state_class: measurement
#       - name: "Altorf proba orages niveau"
#         unique_id: altorf_proba_orages_niveau
#         state: "{{ state_attr('sensor.altorf_probabilite_d_orages', 'level') }}"
#         state_class: measurement
#       - name: "Altorf proba grele niveau"
#         unique_id: altorf_proba_grele_niveau
#         state: "{{ state_attr('sensor.altorf_probabilite_de_grele_5_cm', 'level') }}"
#         state_class: measurement
#       - name: "Altorf proba tornade niveau"
#         unique_id: altorf_proba_tornade_niveau
#         state: "{{ state_attr('sensor.altorf_probabilite_de_tornade', 'level') }}"
#         state_class: measurement
#
# Step 2: gauge those numeric sensors.
type: horizontal-stack
cards:
  - type: gauge
    entity: sensor.altorf_risque_orages_niveau
    name: Risque d'orages
    min: 0
    max: 5
    needle: true
    severity:
      green: 0
      yellow: 2
      red: 4
  - type: gauge
    entity: sensor.altorf_proba_orages_niveau
    name: Proba orages
    min: 0
    max: 5
    needle: true
    severity:
      green: 0
      yellow: 2
      red: 4
  - type: gauge
    entity: sensor.altorf_proba_grele_niveau
    name: Proba grêle
    min: 0
    max: 5
    needle: true
    severity:
      green: 0
      yellow: 2
      red: 4
  - type: gauge
    entity: sensor.altorf_proba_tornade_niveau
    name: Proba tornade
    min: 0
    max: 5
    needle: true
    severity:
      green: 0
      yellow: 2
      red: 4

# ─────────────────────────────────────────────────────────────────────────────
# Option B — Entities card (no install, no templates)
# Shows the text state directly; tap an entity to see the level/color attributes.
# ─────────────────────────────────────────────────────────────────────────────
# type: entities
# title: Risque orageux — Altorf
# entities:
#   - entity: sensor.altorf_risque_d_orages
#     name: Risque d'orages
#   - entity: sensor.altorf_probabilite_d_orages
#     name: Probabilité d'orages
#   - entity: sensor.altorf_probabilite_de_grele_5_cm
#     name: Probabilité grêle > 5 cm
#   - entity: sensor.altorf_probabilite_de_tornade
#     name: Probabilité tornade

# ─────────────────────────────────────────────────────────────────────────────
# Option C — Gauge straight from the attribute (needs HACS "gauge-card")
# custom:gauge-card can read a numeric attribute, so no template sensor needed.
# ─────────────────────────────────────────────────────────────────────────────
# type: custom:gauge-card
# entity: sensor.altorf_risque_d_orages
# attribute: level
# name: Risque d'orages
# min: 0
# max: 5
# severity:
#   green: 0
#   yellow: 2
#   red: 4

# ─────────────────────────────────────────────────────────────────────────────
# Option D — Mushroom template chips (needs HACS "Mushroom" frontend)
# Colour-codes by gravity level and shows the text as secondary.
# ─────────────────────────────────────────────────────────────────────────────
# type: custom:mushroom-template-card
# entity: sensor.altorf_risque_d_orages
# primary: Risque d'orages
# secondary: "{{ states(entity) }}"
# icon: mdi:weather-lightning
# icon_color: >-
#   {{ ['grey','green','yellow','orange','red','purple'][state_attr(entity,'level') | int(0)] }}
#
# For the EXACT Keraunos hex colours, install card-mod and style from the
# `color` attribute, e.g.:
#   card_mod:
#     style: |
#       ha-card { --card-mod-icon-color: {{ state_attr(entity, 'color') }}; }
